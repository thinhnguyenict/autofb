# Nginx site configuration for AutoFB Dashboard
#
# Place this file in /etc/nginx/sites-available/autofb
# Then enable it:
#   sudo ln -s /etc/nginx/sites-available/autofb /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Requirements on the VPS:
#   sudo apt install nginx php-fpm php-json
#   (php-posix is part of php-common and usually already present)
#
# Adjust the values marked with <...> for your setup.

server {
    listen 80;
    # listen 443 ssl;  # Uncomment and add SSL certs for HTTPS

    server_name <your-domain-or-IP>;   # e.g. 123.456.789.0 or dashboard.example.com

    # Root points to the web/ sub-directory of the application
    root /root/autofb/web;             # <-- change to your actual app path + /web
    index index.php;

    # ── PHP processing ────────────────────────────────────────────────────────
    location ~ \.php$ {
        include        fastcgi_params;
        fastcgi_pass   unix:/run/php/php8.2-fpm.sock;  # adjust PHP version if needed
        fastcgi_index  index.php;
        fastcgi_param  SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }

    # ── Static assets ─────────────────────────────────────────────────────────
    location /assets/ {
        expires 1h;
        add_header Cache-Control "public";
    }

    # ── Block direct access to config.php and auth.php ────────────────────────
    location ~* ^/(config|auth)\.php$ {
        deny all;
    }

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options       "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy       "strict-origin-when-cross-origin";

    # ── Optional: restrict dashboard to a trusted IP ──────────────────────────
    # allow 203.0.113.5;   # your IP
    # deny  all;

    # ── Logging ───────────────────────────────────────────────────────────────
    access_log /var/log/nginx/autofb_access.log;
    error_log  /var/log/nginx/autofb_error.log;
}
