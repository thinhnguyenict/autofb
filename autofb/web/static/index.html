<!doctype html>
<html lang="vi">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>AutoFB</title><link rel="stylesheet" href="/static/app.css"></head>
<body><main><header><h1>AutoFB</h1><p>Quản lý workspace, Fanpage và lịch đăng.</p></header>
<section id="auth"><h2>Đăng nhập</h2><form id="login"><input id="email" type="email" placeholder="Email" required><input id="password" type="password" placeholder="Mật khẩu" required minlength="12"><button>Đăng nhập</button></form><p>Chưa có tài khoản? <button id="register" class="link">Tạo tài khoản</button></p></section>
<section id="app" hidden><div class="toolbar"><strong id="who"></strong><button id="logout">Đăng xuất</button></div><div class="grid"><article><h2>Workspace</h2><form id="workspace"><input id="workspace-name" placeholder="Tên workspace" required><button>Tạo workspace</button></form><select id="workspaces"></select><button id="connect">Kết nối Facebook</button><div id="pages"></div><h3>Thành viên</h3><form id="member"><input id="member-email" type="email" placeholder="Email thành viên" required><select id="member-role"><option value="publisher">publisher</option><option value="editor">editor</option><option value="admin">admin</option><option value="viewer">viewer</option></select><button>Thêm/cập nhật</button></form><div id="members"></div><h3>Kết nối & thông báo</h3><div id="connections"></div><button id="mark-read" type="button">Đánh dấu thông báo đã đọc</button><div id="notifications"></div><h3>Nhật ký quản trị</h3><div id="audit-logs"></div></article><article><h2>Lên lịch bài viết</h2><form id="media" enctype="multipart/form-data"><input id="media-file" type="file" accept="image/jpeg,image/png,video/mp4"><button>Tải media</button></form><div id="media-list"></div><form id="post"><select id="page" required></select><textarea id="body" placeholder="Nội dung bài viết" required></textarea><fieldset><legend>Media đính kèm</legend><div id="media-options"></div></fieldset><input id="scheduled" type="datetime-local" required><button>Tạo và lên lịch</button></form><div id="posts"></div><h3>Hàng đợi publish</h3><div id="publish-jobs"></div></article></div></section><p id="message" role="alert"></p></main><script src="/static/app.js"></script></body></html>
